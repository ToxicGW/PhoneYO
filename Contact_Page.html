<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <link rel="stylesheet" href="CssStyles.css">

    <style>
        .container {
            width: 80%;
            margin: 20px auto;
            background-color: #e3f9f3;
            padding: 20px;
            border-radius: 10px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-size: 16px;
        }
        input, textarea {
            padding: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>

    <div class="container">
        <h2>Get in Touch</h2>
        <p>We’d love to hear from you! Feel free to contact us using the form below or through the details provided.</p>

        <h3>Contact Information:</h3>
        <ul>
            <li><b>Phone:</b> +123-456-7890</li>
            <li><b>Email:</b> support@phoneyo.com</li>
            <li><b>Address:</b> 123 Smartphone Street, Tech City, TX 75001</li>
        </ul>

        <h3>Send Us a Message:</h3>
        <form id="contact-form" onsubmit="return handleSubmit(event)">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" placeholder="Write your message here" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();  // Prevent form from submitting

            alert("Thank you for reaching out! We will respond soon.");

            document.getElementById("contact-form").reset(); // Reset form fields
            return false;  // Prevent page reload
        }
    </script>
</body>
</html>
